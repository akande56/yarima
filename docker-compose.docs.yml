services:
  docs:
    image: yarima_mining_local_docs
    container_name: yarima_mining_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./yarima_mining:/app/yarima_mining:z
    ports:
      - '9000:9000'
    command: /start-docs

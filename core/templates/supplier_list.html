<div class="card glass-card p-3 mb-4">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="text-light mb-0">{% trans "Suppliers" %}</h5>
  </div>

  <div class="table-responsive mt-3">
    <table class="table table-dark table-hover table-bordered align-middle">
      <thead>
        <tr>
          <th scope="col">{% trans "Name" %}</th>
          <th scope="col">{% trans "Contact" %}</th>
          <th scope="col">{% trans "Last Day Supplied" %}</th>
        </tr>
      </thead>
      <tbody>
        {% for supplier in suppliers %}
        <tr>
          <td>{{ supplier.name }}</td>
          <td>{{ supplier.contact_info }}</td>
          <td>{{ supplier.last_day_received|date:"M d, Y" }}</td>
            
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="3" class="text-center text-muted">{% trans "No suppliers found." %}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
